<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat Workspace - AutoJobApply</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .chat-layout {
      display: grid;
      grid-template-columns: 240px 1fr 300px;
      height: calc(100vh - 70px);
      gap: 16px;
      margin-top: 16px;
    }
    .history-panel, .chat-panel, .tools-panel {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      padding: 14px;
      border-bottom: 1px solid var(--border-color);
      font-weight: 600;
      font-size: 14px;
    }
    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    .history-item {
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-item:hover, .history-item.active {
      background: rgba(255, 255, 255, 0.05);
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.4;
    }
    .msg.user {
      align-self: flex-end;
      background: #3b82f6;
      color: white;
    }
    .msg.assistant {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
    }
    .chat-input-area {
      padding: 14px;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 10px;
    }
    .tool-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    .tool-item {
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 12px;
    }
    .tool-name-lbl {
      font-weight: bold;
      color: #3b82f6;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <div class="sidebar"></div>

    <div class="main-content">
      <!-- Topbar -->
      <div class="topbar">
        <button class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
        <div class="topbar-title">AI Chat Workspace</div>
        <div class="topbar-right" style="display:flex; gap:12px; align-items:center;">
          <span class="form-control" style="width: auto; padding: 4px 10px; font-size:12px; display:inline-flex; align-items:center; gap:6px; background:rgba(245,158,11,0.1); border-color:#f59e0b; color:#f59e0b;">
            ⚡ Groq (Llama 3.3 70B)
          </span>
          <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Dark/Light Mode">🌓</button>
        </div>
      </div>

      <!-- Page Body -->
      <div class="page-body fade-in">
        <div class="chat-layout">
          <!-- Left: History -->
          <div class="history-panel">
            <div class="panel-header">Chat History</div>
            <div class="history-list" id="conv-list">
              <div class="history-item active">New Conversation</div>
            </div>
          </div>

          <!-- Middle: Chat Workspace -->
          <div class="chat-panel">
            <div class="panel-header" id="chat-header">Direct Agent Chat</div>
            <div class="chat-messages" id="chat-box">
              <div class="msg assistant">Hello! I am your AI agent. I can search jobs, analyze resumes, write cover letters, and fill application forms. Tell me what you want to do!</div>
            </div>
            <div class="chat-input-area">
              <input type="text" id="chat-input" class="form-control" placeholder="Ask agent to search jobs, write cover letter..." onkeypress="if(event.key === 'Enter') chatController.sendMessage()">
              <button class="btn btn-primary" onclick="chatController.sendMessage()">Send</button>
            </div>
          </div>

          <!-- Right: Tool Inspector -->
          <div class="tools-panel">
            <div class="panel-header">Tool Inspector & MCP Schemas</div>
            <div class="tool-list" id="tool-box">
              <p style="color: var(--text-muted); padding:10px;">Loading MCP Tools...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
