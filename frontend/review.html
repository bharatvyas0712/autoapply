<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Queue - AutoJobApply</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .review-card {
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      background: var(--card-bg);
      padding: 20px;
    }
    .review-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .confidence-badge {
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-low {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }
    .badge-medium {
      background: rgba(245, 158, 11, 0.15);
      color: #f59e0b;
    }
    .question-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .proposed-answer-box {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      color: var(--text-color);
      font-size: 13px;
      resize: vertical;
      margin-bottom: 16px;
    }
    .review-actions {
      display: flex;
      gap: 10px;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <div class="sidebar"></div>

    <div class="main-content">
      <!-- Topbar -->
      <div class="topbar">
        <button class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
        <div class="topbar-title">AI Review Queue</div>
        <div class="topbar-right">
          <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Dark/Light Mode">🌓</button>
        </div>
      </div>

      <!-- Page Body -->
      <div class="page-body fade-in">
        <div class="page-header">
          <h1 style="font-size: 24px; font-weight: 700;">Human-in-the-Loop Review</h1>
          <p>Triage low-confidence answers or custom question prompts generated by the AI before application submission.</p>
        </div>

        <div class="grid-3">
          <!-- Pending review questions -->
          <div class="card" style="grid-column: span 2;">
            <div class="card-header">
              <h3 class="card-title">Pending Questions</h3>
            </div>
            <div class="card-body" id="review-items-container">
              <!-- Dynamically populated -->
              <p style="color: var(--text-muted);">Loading pending queue...</p>
            </div>
          </div>

          <!-- Tailored Cover Letters history/view -->
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">Generated Cover Letters</h3>
            </div>
            <div class="card-body" id="cover-letters-container">
              <p style="color: var(--text-muted);">Loading letters...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/review.js"></script>
</body>
</html>
