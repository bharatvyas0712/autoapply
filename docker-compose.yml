version: '3.8'

# Global logging config for all services
x-logging:
  &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: autojobapply_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: autojobapply
      MYSQL_USER: ${DB_USER:-autojobapply}
      MYSQL_PASSWORD: ${DB_PASSWORD:-rootpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/models/db_schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - autojobapply_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autojobapply_backend
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-autojobapply}
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      DB_NAME: autojobapply
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      AUTOMATION_SERVICE_URL: http://automation:5001
    ports:
      - "3000:3000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - autojobapply_network
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Python Automation Service
  automation:
    build:
      context: .
      dockerfile: automation/Dockerfile
    container_name: autojobapply_automation
    environment:
      PORT: 5001
      PLAYWRIGHT_HEADLESS: "true"
      FORM_AGENT_SERVICE_URL: http://backend:3000
      BACKEND_API_URL: http://backend:3000
      AUTOJOBAPPLY_LOGIN_WAIT_SECONDS: 600
      AUTOJOBAPPLY_FIELD_REVIEW_TIMEOUT_SECONDS: 900
    ports:
      - "5001:5001"
    volumes:
      - ./browser_profile:/app/browser_profile
      - ./backend/uploads:/app/uploads
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - autojobapply_network
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    # Display for headed browser (optional)
    # environment:
    #   DISPLAY: host.docker.internal:0

  # NGINX Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: autojobapply_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      automation:
        condition: service_healthy
    networks:
      - autojobapply_network
    restart: unless-stopped
    logging: *default-logging

volumes:
  mysql_data:

networks:
  autojobapply_network:
    driver: bridge
